cosmos:
  catalog_path: src/galgenai/cosmos/data/test_catalog_30objects.fits
  hf_dataset_path: src/galgenai/cosmos/data/HSC_dataset30
  # catalog_path: src/galgenai/cosmos/data/COSMOSWeb_mastercatalog_v1.fits
  # hf_dataset_path: src/galgenai/cosmos/data/HSC_dataset
  image_size: 75
  HST_snr_threshold: 50
  split_seed: 42 # To split the dataset
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
  num_workers: 8
  max_galaxies: 50000 # inluding train + test + val [Some simulation may fail]
  seed: 42 # To add noise etc.
  max_fft_size: 512
  catalog_columns: # These are names of catalog columns 
    magnitude_prefix: mag_model_hsc-
    hlr: radius_sersic
    sersic_n: sersic
    sersic_ratio: axratio_sersic
    sersic_angle: angle_sersic
    ra: ra
    dec: dec
    photz: zfinal
    galid: id
    snr: snr_hst-f814w